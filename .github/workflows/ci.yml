name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run validate

      - name: Check package contents
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Configure npm token
        if: env.NPM_TOKEN != ''
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"

      - name: Check whether this version is already published
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          echo "name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "version=${package_version}" >> "$GITHUB_OUTPUT"

          if npm view "${package_name}@${package_version}" version --json > npm-view.json 2> npm-view.err; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Package ${package_name}@${package_version} is already published; skipping npm publish." >> "$GITHUB_STEP_SUMMARY"
          elif grep -q "E404" npm-view.err; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Package ${package_name}@${package_version} is not published yet; publishing to npm." >> "$GITHUB_STEP_SUMMARY"
          else
            cat npm-view.err >&2
            exit 1
          fi

      - name: Publish package
        if: steps.package.outputs.published == 'false'
        run: npm publish --provenance --access public
